<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credits - Dranima</title>
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="icon" href="images/favicon.png" type="image/png">
    <script src="script/common.js" defer></script>
    <script src="script/credits.js" defer></script>
    <script src="script/main.js" defer></script>
</head>
<body>

    <!-- ====== LOADER ====== -->
    <div id="loader-container"></div>

    <!-- ====== NAVBAR ====== -->
    <div id="navbar-container"></div>

    <!-- ====== HERO ====== -->
    <section class="hero hero-credits" id="hero">
        <div class="title-box">
            <img class="title-star" src="images/title_star.svg" alt="Star" />
            <h1>Credits</h1>
        </div>
    </section>

    <!-- ====== CREDITS ====== -->
    <section class="section-credits bg-pattern spiked" id="credits">
        <div id="credits-container"></div>
    </section>

    <!-- ====== GUEST DRANIMON ARTISTS ====== -->
    <section class="section-guest-artists" id="guest-artists">
        <h2>Guest Dranimae Artists</h2>
        <div class="credits-guest-list" id="credits-guest-container"></div>
    </section>

    <!-- ====== FOOTER ====== -->
    <div id="footer-container"></div>

</body>
</html>
