<div id="loader" class="bg-pattern">

        <div class="loader-spinner">
            <div class="loader-dot" style="--i:0"></div>
            <div class="loader-dot" style="--i:1"></div>
            <div class="loader-dot" style="--i:2"></div>
            <div class="loader-dot" style="--i:3"></div>
            <div class="loader-dot" style="--i:4"></div>
            <div class="loader-dot" style="--i:5"></div>
            <div class="loader-dot" style="--i:6"></div>
            <div class="loader-dot" style="--i:7"></div>
        </div>
        <span class="loader-text">Loading...</span>
    </div>
</div>
