<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki - Dranima</title>
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="icon" href="images/favicon.png" type="image/png">
    <script src="script/common.js" defer></script>
    <script src="script/wiki.js" defer></script>
    <script src="script/main.js" defer></script>
</head>
<body>

    <!-- ====== LOADER ===== -->
    <div id="loader-container"></div>

    <!-- ====== NAVBAR ====== -->
    <div id="navbar-container"></div>

    <!-- ====== HERO ====== -->
    <section class="hero hero-credits" id="hero">
        <div class="title-box">
            <img class="title-star" src="images/title_star.svg" alt="Star" />
            <h1>Wiki</h1>
        </div>
    </section>

    <!-- ====== WIKI CATEGORIES ====== -->
    <section class="section-wiki bg-pattern spiked" id="wiki-categories">
        <div id="wiki-container"></div>
    </section>

    <!-- ====== WIKI DISCLAIMER ====== -->
    <section class="section-wiki-disclaimer info-section">
        <h1>Please Note</h1>
        <p>This wiki may not be up to date. If you find any errors or have questions, feel free to contact the team leader at <strong>alex_bourbon</strong> on Discord.</p>
    </section>

    <!-- ====== FOOTER ====== -->
    <div id="footer-container"></div>

</body>
</html>
